name: Frontend CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  frontend-ci:
    name: Type Check · Lint · Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node 20 ─────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. TypeScript type check ──────────────────────────────
      - name: Type check
        run: npx tsc --noEmit

      # ── 5. ESLint ─────────────────────────────────────────────
      - name: Lint
        run: npm run lint

      # ── 6. Next.js build ──────────────────────────────────────
      - name: Build
        run: npm run build
        env:
          # Treat warnings as errors during CI build
          CI: true
