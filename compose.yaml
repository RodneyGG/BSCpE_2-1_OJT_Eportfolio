services:
  # Nginx Reverse Proxy Gateway
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  # Next.js Frontend App
  frontend:
    image: next-js:1.0
    container_name: nextjs_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - app-network

  # Laravel Backend API
  backend:
    image: laravel:1.0
    container_name: laravel_backend
    ports:
      - "8000:8000"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=eportfolio_db
      - DB_USERNAME=bscpe21
      - DB_PASSWORD=bscpe21
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  # MySQL Database Server
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_password
      MYSQL_DATABASE: eportfolio_db
      MYSQL_USER: bscpe21
      MYSQL_PASSWORD: bscpe21
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "bscpe21", "-pbscpe21"]
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Redis Cache Server
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

volumes:
  mysql_data:
  redis_data:

networks:
  app-network:
    driver: bridge